<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun!</title>
    <style>
        body { 
            background: #0b0b0b; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            border: 2px solid #ff4757;
            border-radius: 15px;
            background: rgba(255, 71, 87, 0.05);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.2);
        }
        h1 { font-size: 2.5rem; color: #ff4757; margin-bottom: 20px; }
        p { font-size: 1.2rem; line-height: 1.6; color: #f1f2f6; }
        .heart { font-size: 60px; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">🤍</div>
        <h1>İyi ki Doğdun Sevgilim!</h1>
        <p>Bütün yıllarım seninle olsun, iyi ki hayatımdasın.<br>
        Seninle her anım çok özel ve değerli.<br>
        Yeni yaşın sana tüm güzellikleri getirsin.</p>
        <p><strong>Seni çok seviyorum!</strong></p>
    </div>
</body>
</html>
